kind = "web"
previewPath = "/"
title = "GroPilot"
version = "1.0.0"
id = "artifacts/gropilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20112
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/gropilot run dev"

[services.env]
PORT = "20112"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/gropilot", "run", "build"]
publicDir = "artifacts/gropilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
